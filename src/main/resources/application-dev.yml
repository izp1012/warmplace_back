spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/warmplace
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
    mongodb:
      host: localhost
      port: 27017
      database: warmplace_chat

app:
  cors:
    allowed-origin-patterns:
      - "http://localhost:5173"
      - "http://localhost:3000"

jwt:
  secret: warmplace-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000
